    <text
      class="name__hero"
      x="50%"
      y="50%"
      font-size="125"
      font-weight="bold"
      font-family="'Century Gothic', 'Futura', sans-serif"
    >
      <tspan class="name__hero__text _delay--clear">Fusora</tspan>
      <tspan
        class="_blink name__hero__cursor"
        dx="-0.25em"
        dy="-0.15em"
      >_</tspan>
    </text>
  </g>
</svg>
