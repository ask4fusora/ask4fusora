<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 400"
  width="1200"
  height="400"
>
  <style>:root {
      --width: 1200;
      --height: 400;

      --background-color: white;
      --text-color: #454545;
      --cursor-color: #555555;
      --accent-1: #ff0066;
      --accent-2: #0077ff;
      --accent-3: #ff8800;
      --accent-4: #6200ff;
      --accent-5: #22cc22;

      --animation-base-duration-seconds: 1s;
      --background-animation-duration: var(--animation-base-duration-seconds);
    }

    .background {
      fill: var(--background-color);

      width: var(--width);
      height: var(--height);

      transform: scaleY(0);
      transform-origin: center;

      animation:
        background
        var(--background-animation-duration)
        ease-in-out
        forwards;
    }

    /* Background wait for dramatic effect, then expand to fill the rect. */
    @keyframes background {
      0% { transform: scale(0); }
      60% { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    .rhs-decoration {
      opacity: 0;
      translate: 97.5% 15%;
      animation:
        _fade-in
        var(--animation-base-duration-seconds)
        ease-in-out
        forwards;
    }

    .rhs-decoration path {
      --i: 0;

      scale: 3;
      fill: transparent;
      opacity: 0;
      stroke: var(--text-color);
      stroke-width: 0.5px;

      animation:
        _rotate calc(var(--animation-base-duration-seconds) * 8) linear 0s infinite forwards,
        _fade-in
        var(--animation-base-duration-seconds)
        ease-in-out
        calc(
          var(--background-animation-duration) * 0.65
          + var(--animation-base-duration-seconds) * var(--i) * 0.35
        )
        1
        forwards;
    }

    .rhs-decoration path._reverse-animation {
      animation-direction: reverse, normal !important;
    }

    .name__underlay__background {
      fill: var(--accent-5);
      x: 0;
      y: 0;
      width: var(--width);
      height: var(--height);
    }

    .name__underlay__blob path {
      scale: var(--scale);
      fill: var(--fill-color);
      animation:
        _rotate
       calc(var(--animation-base-duration-seconds) * 8)
       linear
       infinite
       forwards;
    }

    .name__underlay__blob--1 {
      --scale: 2;
      --fill-color: var(--accent-1);
      translate: 62% 60%;
    }

    .name__underlay__blob--2 {
      --scale: 4;
      --fill-color: var(--accent-2);
      translate: 69% -14%;
    }

    .name__underlay__blob--3 {
      --scale: 5;
      --fill-color: var(--accent-3);
      translate: 14% 85%;
    }

    .name__underlay__blob--4 {
      --scale: 4;
      --fill-color: var(--accent-4);
      translate: 18% 2%;
    }

    .name__hero {
      text-anchor: middle;
      dominant-baseline: central;
    }

    .name__hero__text {
      opacity: 0;
      fill: var(--text-color);
      animation:
        name__hero__text
        calc(var(--animation-base-duration-seconds) * 0.35)
        step-end
        forwards;
    }

    @keyframes name__hero__text {
      20% { opacity: 0.5; }
      40% { opacity: 0; }
      60% { opacity: 0.9; }
      80% { opacity: 0; }
      100% { opacity: 1; fill: url(#name__underlay); }
    }

    .name__hero__cursor {
      opacity: 0;
      fill: var(--cursor-color);
      font-family: monospace;
      animation-delay:
        calc(var(--animation-base-duration-seconds) * 0.35 + var(--background-animation-duration))
        !important;
    }

    .fade-up {
      --amount: 60px;
      opacity: 0;
      transform: translateY(var(--amount));
      animation: fade-up 0.4s cubic-bezier(0.25, 1, 0.5, 1) 0.6s 1 forwards;
    }

    .fade-down {
      --amount: -60px;
      opacity: 0;
      transform: translateY(var(--amount));
      animation: fade-down 0.4s cubic-bezier(0.25, 1, 0.5, 1) 0.6s 1 forwards;
    }

    .fade-right {
      --amount: 60px;
      opacity: 0;
      transform: translateX(var(--amount));
      animation: fade-right 0.4s cubic-bezier(0.25, 1, 0.5, 1) 0.6s 1 forwards;
    }

    .small {
      --amount: 20px;
    }

    .fade-down.small {
      --amount: -20px;
    }

    .fade-scale {
      transform: scaleX(0);
      transform-origin: 54px 0;
      animation: fade-scale 0.4s cubic-bezier(0.25, 1, 0.5, 1) 0.6s 1 forwards;
    }

    .d-05 {
      animation-delay: 0.65s;
    }

    .d-1 {
      animation-delay: 0.7s;
    }

    .d-15 {
      animation-delay: 0.75s;
    }

    .d-2 {
      animation-delay: 0.8s;
    }

    .d-25 {
      animation-delay: 0.85s;
    }

    .d-3 {
      animation-delay: 0.9s;
    }

    .d-35 {
      animation-delay: 0.95s;
    }

    .d-4 {
      animation-delay: 1s;
    }

    .d-45 {
      animation-delay: 1.05s;
    }

    .d-5 {
      animation-delay: 1.1s;
    }

    .d-55 {
      animation-delay: 1.15s;
    }

    .d-6 {
      animation-delay: 1.2s;
    }

    .d-6 {
      animation-delay: 1.25s;
    }

    .d-7 {
      animation-delay: 1.3s;
    }

    @keyframes fade-up {
      0% {
        opacity: 0;
        transform: translateY(var(--amount));
      }

      10% {
        transform: translateY(var(--amount));
      }

      30% {
        opacity: 1;
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-down {
      0% {
        opacity: 0;
        transform: translateY(var(--amount));
      }

      10% {
        transform: translateY(var(--amount));
      }

      30% {
        opacity: 1;
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-right {
      0% {
        opacity: 0;
        transform: translateX(var(--amount));
      }

      10% {
        transform: translateX(var(--amount));
      }

      30% {
        opacity: 1;
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fade-scale {
      0% {
        transform: scaleX(0);
      }

      100% {
        transform: scaleX(1);
      }
    }

    ._reverse-animation {
      animation-direction: reverse !important;
    }

    ._fade-up {
      --offset: calc(var(--height) * 0.35px);

      opacity: 0;
      transform: translateY(var(--offset));

      animation:
        _fade-up
        calc(var(--animation-base-duration-seconds) * 0.35)
        cubic-bezier(0.25, 1, 0.5, 1)
        forwards;
    }

    ._rotate {
      transform-origin: center center;
      animation:
        _rotate
       calc(var(--animation-base-duration-seconds) * 8)
       linear
       infinite
       forwards;
    }

    ._delay--vague {
      --delay-for-steps: 0;
      animation-delay: calc(
          var(--background-animation-duration) * 0.65
          + var(--animation-base-duration-seconds) * 0.35 * var(--delay-for-steps)
        ) !important;
    }

    ._delay--clear {
      --delay-for-steps: 0;
      animation-delay: calc(
          var(--background-animation-duration)
          + var(--animation-base-duration-seconds) * 0.35 * var(--delay-for-steps)
        ) !important;
    }

    ._blink {
      animation:
        _blink
        calc(var(--animation-base-duration-seconds) * 0.8)
        step-end
        infinite
        forwards;
    }

    @keyframes _blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes _rotate {
      0% { rotate: 0deg; }
      100% { rotate: 360deg; }
    }

    @keyframes _fade-in {
      0% { opacity: 0; }
      35% { opacity: 1; }
      100% { opacity: 1; }
    }

    @keyframes _fade-up {
      0% {
        opacity: 0;
        transform: translateY(--offset);
      }
      18% { transform: translateY(--offset); }
      35% { opacity: 1; }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }</style>

  <rect class="background" />

