    />
  </g>

  <g id="name" class="_fade-up _delay--clear">
    <defs>
      <pattern id="name__underlay" width="100%" height="100%" patternUnits="userSpaceOnUse">
        <rect class="name__underlay__background" />
        <g class="name__underlay__blob name__underlay__blob--1">
          <path d="M53.2,-73.5C68,-62.5,78.4,-45.7,83.7,-27.6C89,-9.6,89.1,9.7,83.3,26.9C77.5,44.1,65.8,59.3,50.9,68.6C36.1,77.9,18,81.4,1.1,79.8C-15.8,78.3,-31.6,71.7,-46,62.3C-60.4,52.8,-73.5,40.5,-79.6,25C-85.8,9.6,-85.1,-8.9,-77.8,-23.4C-70.5,-38,-56.7,-48.5,-42.7,-59.8C-28.6,-71.1,-14.3,-83.2,2.4,-86.5C19.2,-89.9,38.4,-84.6,53.2,-73.5Z" />
        </g>
        <g class="name__underlay__blob name__underlay__blob--2">
          <path d="M54.2,-72.6C70,-63.1,82.5,-47,85,-29.8C87.6,-12.7,80.2,5.5,71.1,19.8C61.9,34.2,51,44.6,38.8,52.6C26.7,60.5,13.4,65.9,0.1,65.7C-13.1,65.5,-26.1,59.7,-38.5,51.9C-50.8,44,-62.4,34,-69.5,20.6C-76.7,7.1,-79.4,-9.8,-75.9,-25.9C-72.4,-42,-62.6,-57.4,-48.9,-67.6C-35.2,-77.8,-17.6,-82.9,0.8,-84C19.2,-85,38.4,-82.1,54.2,-72.6Z" />
        </g>
